services:
  medusa-data:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_VALUE}   # stored in .env file
      POSTGRES_USER: medusa
      POSTGRES_DB: medusa_data
    ports:
      - 127.0.0.1:5432:5432 # don't publically expose port
    volumes:
      - medusa-postgres-data:/var/lib/postgresql/data

  medusa-redis:
    image: redis:8
    restart: unless-stopped
    ports:
      - 127.0.0.1:6379:6379 # don't publically expose port
    volumes:
      - medusa-redis-data:/data

  medusa-nginx:
    image: nginx:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  medusa-postgres-data:
  medusa-redis-data:
