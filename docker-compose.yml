services:
  medusa-data:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: password1234
      POSTGRES_USER: medusa
      POSTGRES_DB: medusa_data
    ports:
      - 5432:5432
    volumes:
      - medusa-data:/var/lib/postgresql/data

volumes:
  medusa-data: 
